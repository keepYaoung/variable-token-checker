<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Variable Token Checker</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #1a1a1a;
    --muted: #6b6b6b;
    --border: #e8e8e8;
    --accent: #18a0fb;
    --ok: #14ae5c;
    --warn: #d97706;
    --mismatch: #e0392f;
    --code-bg: #f5f6f7;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1e;
      --fg: #f0f0f0;
      --muted: #9aa0a6;
      --border: #2d2d2d;
      --code-bg: #2a2a2a;
    }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
    font-size: 12px;
    color: var(--fg);
    background: var(--bg);
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex: 0 0 auto;
  }
  .frames {
    font-weight: 600;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  button {
    background: var(--accent);
    color: white;
    border: none;
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
  }
  button:hover { filter: brightness(1.1); }
  .summary {
    display: flex;
    gap: 6px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
    flex: 0 0 auto;
  }
  .chip {
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--code-bg);
    font-weight: 600;
    font-size: 11px;
  }
  .chip.ok { color: var(--ok); }
  .chip.mismatch { color: var(--mismatch); }
  .chip.warn { color: var(--warn); }
  .chip.hardcoded { color: var(--mismatch); }
  .tabs {
    display: flex;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex: 0 0 auto;
  }
  .tab {
    flex: 1;
    padding: 8px 12px;
    text-align: center;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    color: var(--muted);
    font-weight: 600;
    user-select: none;
  }
  .tab.active {
    color: var(--fg);
    border-bottom-color: var(--accent);
  }
  .body {
    flex: 1;
    overflow-y: auto;
  }
  section { display: none; }
  section.active { display: block; }
  .empty {
    padding: 32px 16px;
    text-align: center;
    color: var(--muted);
  }
  .error {
    padding: 32px 16px;
    text-align: center;
    color: var(--mismatch);
    line-height: 1.5;
  }
  .item {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .item .row1 {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .path {
    font-weight: 600;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .prop {
    color: var(--muted);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
  }
  .verdict {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    border: 1px solid transparent;
  }
  .v-diff-token, .v-one-hardcoded, .v-structure-prop {
    background: rgba(224, 57, 47, 0.13);
    color: var(--mismatch);
  }
  .v-both-hardcoded {
    background: rgba(217, 119, 6, 0.15);
    color: var(--warn);
  }
  .v-ok {
    background: rgba(20, 174, 92, 0.13);
    color: var(--ok);
    text-transform: none;
    letter-spacing: normal;
  }
  .sides {
    margin-top: 6px;
    display: flex;
    gap: 12px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
  }
  .sides > div { flex: 1; min-width: 0; word-break: break-all; }
  .sides.one {
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }
  .sep { color: var(--muted); }
  .side-label {
    color: var(--muted);
    font-weight: 700;
    margin-right: 4px;
  }
  .valchip {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    background: color-mix(in srgb, var(--fg) 5%, transparent);
    border: 1px solid var(--border);
    color: var(--fg);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    word-break: break-all;
  }
  .muted { color: var(--muted); }
  .coll { color: var(--muted); }
  .modes {
    margin-top: 8px;
    background: var(--code-bg);
    padding: 8px;
    border-radius: 6px;
  }
  .modes .vname {
    color: var(--muted);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    margin-bottom: 4px;
  }
  .modes table {
    width: 100%;
    border-collapse: collapse;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
  }
  .modes th, .modes td {
    text-align: left;
    padding: 2px 6px 2px 0;
  }
  .modes th {
    color: var(--muted);
    font-weight: 500;
    border-bottom: 1px solid var(--border);
  }
  .thumbs {
    margin-top: 8px;
    display: flex;
    gap: 12px;
  }
  .thumb { flex: 1; min-width: 0; }
  .thumb .tlabel {
    color: var(--muted);
    font-weight: 700;
    font-size: 10px;
    margin-bottom: 3px;
  }
  .thumb img {
    display: block;
    width: 100%;
    max-height: 220px;
    object-fit: contain;
    object-position: center;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--code-bg);
  }
  .thumbs.sub { margin-top: 6px; gap: 8px; }
  /* Fixed, equal-size box per side; asset centered inside with 20px breathing
     room, keeping its aspect (background fills the box incl. padding). */
  .thumbs.sub .thumb img {
    height: 120px;
    max-height: none;
    padding: 20px;
    object-fit: contain;
    object-position: center;
  }
  .count {
    color: var(--muted);
    font-size: 11px;
    font-weight: 600;
    margin-left: auto;
  }
  .chev {
    flex: 0 0 auto;
    width: 0;
    height: 0;
    border-left: 5px solid currentColor;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    transition: transform 0.12s ease;
  }
  .item:not(.collapsed) .chev { transform: rotate(90deg); }
  .item.collapsed .group-body { display: none; }
  .expand-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 8px;
  }
  .expand-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: transparent;
    color: color-mix(in srgb, color-mix(in srgb, var(--accent) 50%, var(--muted)) 70%, white);
    border: none;
    padding: 2px 0;
  }
  .expand-btn:hover { text-decoration: underline; filter: none; }
  .expand-btn .exlabel::before { content: 'Expand layers'; }
  .item:not(.collapsed) .expand-btn .exlabel::before { content: 'Collapse'; }
  .sublist {
    margin-top: 8px;
  }
  .subrow {
    padding: 8px 0 0 10px;
    margin-top: 8px;
    border-left: 2px solid var(--border);
    cursor: pointer;
  }
  .subrow:first-child { margin-top: 0; }
  .subrow:hover { border-left-color: var(--accent); background: rgba(0, 0, 0, 0.03); }
  .subrow.selected { border-left-color: var(--accent); }
  .subrow.selected .modes { filter: invert(1); }
  .item.selected { box-shadow: inset 2px 0 0 var(--accent); }
  .subpath {
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    font-size: 11px;
    color: var(--fg);
  }
  .tag-name {
    display: inline-block;
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    background: var(--code-bg);
    color: var(--muted);
    border: 1px solid var(--border);
  }
  .kind {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    /* Tint stays distinguishable from the row background on hover, both themes. */
    background: color-mix(in srgb, var(--fg) 5%, transparent);
    border: 1px solid var(--border);
    color: var(--fg);
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
  }
  .swatch {
    display: inline-block;
    width: 11px;
    height: 11px;
    border-radius: 2px;
    border: 1px solid rgba(128, 128, 128, 0.45);
    margin-right: 6px;
    vertical-align: -1px;
  }
  /* Keep swatches showing their true color even when the block is inverted. */
  .subrow.selected .modes .swatch { filter: invert(1); }
  .footer {
    flex: 0 0 auto;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    align-items: center;
    padding: 10px 12px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .footer button {
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 500;
    border-radius: 7px;
  }
  #rename-all {
    background: var(--code-bg);
    color: var(--fg);
    border: 1px solid var(--border);
  }
  .resize {
    position: fixed;
    right: 0;
    bottom: 0;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    color: var(--muted);
    cursor: nwse-resize;
    z-index: 20;
    touch-action: none;
    opacity: 0.7;
  }
  .resize:hover { opacity: 1; }
  .resize svg { pointer-events: none; }
</style>
</head>
<body>
  <header>
    <div class="frames" id="frames">Variable Token Checker</div>
  </header>
  <div class="summary" id="summary"></div>
  <div class="tabs">
    <div class="tab active" data-tab="ok">Matched</div>
    <div class="tab" data-tab="mismatches">Mismatches</div>
    <div class="tab" data-tab="structure">Structure</div>
    <div class="tab" data-tab="hardcoded">Hardcoded</div>
  </div>
  <div class="body">
    <section class="active" id="tab-ok"></section>
    <section id="tab-mismatches"></section>
    <section id="tab-structure"></section>
    <section id="tab-hardcoded"></section>
  </div>
  <div class="footer">
    <button id="rename-all">Unify Layer Names</button>
    <button id="rerun">Compare</button>
  </div>
  <div id="resize" class="resize" title="Drag to resize">
    <svg viewBox="0 0 16 16" width="16" height="16">
      <path d="M6 15 L15 6 M10 15 L15 10" stroke="currentColor" stroke-width="1.4" fill="none" />
    </svg>
  </div>

<script>
  function el(html) {
    const t = document.createElement('template');
    t.innerHTML = html.trim();
    return t.content.firstChild;
  }
  function esc(s) {
    return String(s).replace(/[&<>"']/g, (c) => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    })[c]);
  }
  function bindingText(b) {
    if (!b) return null;
    if (b.kind === 'variable') return b.variableName;
    if (b.kind === 'style') return b.styleName;
    if (b.kind === 'hardcoded') return b.rawValue;
    if (b.kind === 'mixed') return 'mixed';
    return null;
  }
  function valChip(text) {
    return text == null
      ? '<span class="muted">—</span>'
      : '<span class="valchip">' + esc(text) + '</span>';
  }
  function sameBinding(a, b) {
    const ta = bindingText(a);
    return ta != null && ta === bindingText(b);
  }
  // Value display. When both sides are identical (already matched — the parent
  // group already shows the match) we drop the "A · B" label and show the value
  // chip · kind chip · collection. Otherwise show A and B side by side.
  function renderSides(a, b, typeLabel, kindChip) {
    const ta = bindingText(a);
    const tb = bindingText(b);
    if (sameBinding(a, b)) {
      const parts = [valChip(ta), kindChip];
      if (typeLabel) {
        parts.push('<span class="coll">' + esc(typeLabel) + '</span>');
      }
      return '<div class="sides one">' + parts.join('<span class="sep">·</span>') + '</div>';
    }
    return '<div class="sides">' +
      '<div><span class="side-label">A</span>' + valChip(ta) + '</div>' +
      '<div><span class="side-label">B</span>' + valChip(tb) + '</div>' +
      '</div>';
  }
  function send(msg) {
    parent.postMessage({ pluginMessage: msg }, '*');
  }
  // Grouping is driven by finding.groupKey (computed in compare.ts, with the
  // shared frame/wrapper path already stripped). The label is its last segment.
  function groupLabelOf(groupKey) {
    const segs = groupKey.split('/');
    return segs[segs.length - 1];
  }
  function subPathOf(pathKey, groupKey) {
    if (pathKey === groupKey) return '';
    return pathKey.slice(groupKey.length + 1);
  }
  // Keep only the last n path segments (default 3) for readability; prefix with
  // "…/" when truncated. Full path is kept for the hover title elsewhere.
  function shortPath(path, n) {
    n = n || 3;
    const segs = String(path).split('/');
    if (segs.length <= n) return path;
    return '…/' + segs.slice(-n).join('/');
  }
  var currentMatched = {};
  var currentSelection = {};
  function isSelected(elm) {
    const a = elm.dataset.idA;
    const b = elm.dataset.idB;
    return Boolean((a && currentSelection[a]) || (b && currentSelection[b]));
  }
  function applySelection() {
    const els = document.querySelectorAll('.subrow, .item');
    for (const elm of els) {
      if (isSelected(elm)) elm.classList.add('selected');
      else elm.classList.remove('selected');
    }
  }
  function valueCell(value) {
    // Prepend a real color swatch when the value is a hex color.
    if (/^#([0-9A-Fa-f]{6}|[0-9A-Fa-f]{8})$/.test(value)) {
      return '<span class="swatch" style="background:' + esc(value) + '"></span>' + esc(value);
    }
    return esc(value);
  }
  function renderModes(varInfo, showName) {
    if (!varInfo || !varInfo.modes || !varInfo.modes.length) return '';
    const rows = varInfo.modes.map((m) =>
      '<tr><td>' + esc(m.modeName) + '</td><td>' + valueCell(m.value) + '</td></tr>',
    ).join('');
    const head = showName
      ? '<div class="vname">' + esc(varInfo.variableName) + ' · ' + esc(varInfo.collectionName) + '</div>'
      : '';
    return '<div class="modes">' + head +
      '<table><thead><tr><th>Mode</th><th>Value</th></tr></thead><tbody>' + rows + '</tbody></table>' +
      '</div>';
  }
  var currentPreviews = {};
  var currentBgA = '';
  var currentBgB = '';
  function thumbHtml(label, id, bg) {
    if (!id || !currentPreviews[id]) return '';
    const style = bg ? ' style="background:' + esc(bg) + '"' : '';
    return '<div class="thumb"><div class="tlabel">' + label + '</div>' +
      '<img' + style + ' src="' + currentPreviews[id] + '" /></div>';
  }
  // Friendly chip label for a prop key (users don't read "fills[0].color").
  // Friendly chip label. Multiple fills/strokes on one layer are numbered
  // (Fill, Fill 2, Fill 3 ...); the first stays unnumbered.
  function propKindLabel(prop) {
    if (prop === 'fillStyle') return 'Fill';
    if (prop === 'strokeStyle') return 'Stroke';
    const m = /^(fills|strokes)\[(\d+)\]/.exec(prop);
    if (m) {
      const base = m[1] === 'fills' ? 'Fill' : 'Stroke';
      const idx = parseInt(m[2], 10);
      return idx > 0 ? base + ' ' + (idx + 1) : base;
    }
    return prop.replace(/\[\d+\]/g, '').replace(/\.color$/, '');
  }
  // One row per finding (a single layer + prop), shown nested inside its group.
  function renderSubRow(f, groupKey) {
    const v = f.verdict;
    const sp = subPathOf(f.pathKey, groupKey);
    const where = sp
      ? '<span class="subpath" title="' + esc(sp) + '">' + esc(shortPath(sp)) + '</span>'
      : '';
    const nameTag = f.nameMatched
      ? '<span class="tag-name" title="Paired by layer name (path differed)">name</span>'
      : '';
    const kindChip = '<span class="kind">' + esc(propKindLabel(f.prop)) + '</span>';
    const same = sameBinding(f.a, f.b);
    const typeLabel = f.a && f.a.kind === 'style'
      ? 'Style'
      : (f.varInfo && f.varInfo.collectionName) || '';
    return '<div class="subrow" data-id-a="' + esc(f.nodeIdA || '') + '"' +
        ' data-id-b="' + esc(f.nodeIdB || '') + '">' +
        '<div class="row1">' +
          '<span class="verdict v-' + esc(v) + '">' + esc(v === 'ok' ? 'Matched' : v.replace(/-/g, ' ')) + '</span>' +
          (same ? '' : kindChip) +
          nameTag +
          where +
        '</div>' +
        renderSides(f.a, f.b, typeLabel, kindChip) +
        (((f.nodeIdA && currentPreviews[f.nodeIdA]) || (f.nodeIdB && currentPreviews[f.nodeIdB]))
          ? '<div class="thumbs sub">' + thumbHtml('A', f.nodeIdA, currentBgA) + thumbHtml('B', f.nodeIdB, currentBgB) + '</div>'
          : '') +
        renderModes(f.varInfo, !same) +
      '</div>';
  }
  // One list item per top-level matched layer; sub-layers nested inside it.
  function renderGroup(group) {
    const ids = currentMatched[group.key] || {};
    const idA = ids.nodeIdA || '';
    const idB = ids.nodeIdB || '';
    const thumbs =
      (idA && currentPreviews[idA]) || (idB && currentPreviews[idB])
        ? '<div class="thumbs">' + thumbHtml('A', idA, currentBgA) + thumbHtml('B', idB, currentBgB) + '</div>'
        : '';
    const rows = group.findings.map((f) => renderSubRow(f, group.key)).join('');
    const noun = group.findings.length === 1 ? 'item' : 'items';
    // Collapsed by default: the top-level layer header + thumbnail stay visible
    // for identification; only the sub-layer list folds away behind the button.
    return el(
      '<div class="item collapsed" data-id-a="' + esc(idA) + '" data-id-b="' + esc(idB) + '">' +
        '<div class="row1">' +
          '<span class="path">' + esc(group.label) + '</span>' +
          '<span class="count">' + group.findings.length + ' ' + noun + '</span>' +
        '</div>' +
        thumbs +
        '<div class="expand-row">' +
          '<button class="expand-btn"><span class="chev"></span><span class="exlabel"></span></button>' +
        '</div>' +
        '<div class="group-body">' +
          '<div class="sublist">' + rows + '</div>' +
        '</div>' +
      '</div>'
    );
  }
  function renderGroups(containerId, list, emptyText) {
    clear(containerId);
    // Only findings with a groupKey are grouped; '' means the shared wrapper
    // (frame) itself, which is excluded.
    list = list.filter((f) => f.groupKey);
    if (!list.length) return setEmpty(containerId, emptyText);
    const groups = [];
    const byKey = {};
    for (const f of list) {
      const gk = f.groupKey;
      let g = byKey[gk];
      if (!g) {
        g = { key: gk, label: groupLabelOf(gk), findings: [] };
        byKey[gk] = g;
        groups.push(g);
      }
      g.findings.push(f);
    }
    const c = document.getElementById(containerId);
    for (const g of groups) c.appendChild(renderGroup(g));
  }
  function clear(id) {
    document.getElementById(id).innerHTML = '';
  }
  function setEmpty(id, text) {
    document.getElementById(id).innerHTML = '<div class="empty">' + esc(text) + '</div>';
  }
  function renderMismatches(report) {
    renderGroups('tab-mismatches', report.findings.filter((f) => f.verdict !== 'ok'), 'No mismatches.');
  }
  function renderOk(report) {
    renderGroups('tab-ok', report.findings.filter((f) => f.verdict === 'ok'), 'No matched bindings.');
  }
  function renderStructure(report) {
    clear('tab-structure');
    const a = report.structureOnlyInA;
    const b = report.structureOnlyInB;
    if (!a.length && !b.length) return setEmpty('tab-structure', 'Layer structures match.');
    const c = document.getElementById('tab-structure');
    const make = (entry, side) =>
      el(
        '<div class="item" data-id="' + esc(entry.nodeId) + '">' +
          '<div class="row1">' +
            '<span class="verdict v-structure-prop">only in ' + side + '</span>' +
            '<span class="path" title="' + esc(entry.pathKey) + '">' + esc(shortPath(entry.pathKey)) + '</span>' +
          '</div>' +
        '</div>'
      );
    for (const e of a) c.appendChild(make(e, 'A'));
    for (const e of b) c.appendChild(make(e, 'B'));
  }
  function renderHardcoded(report) {
    clear('tab-hardcoded');
    const total = report.hardcodedInA.length + report.hardcodedInB.length;
    if (!total) return setEmpty('tab-hardcoded', 'No hardcoded values.');
    const c = document.getElementById('tab-hardcoded');
    const make = (entry, side) =>
      el(
        '<div class="item" data-id="' + esc(entry.nodeId) + '">' +
          '<div class="row1">' +
            '<span class="verdict v-one-hardcoded">' + side + '</span>' +
            '<span class="path" title="' + esc(entry.pathKey) + '">' + esc(shortPath(entry.pathKey)) + '</span>' +
            '<span class="prop">· ' + esc(entry.prop) + '</span>' +
          '</div>' +
          '<div class="sides"><div>\u{1F4CC} ' + esc(entry.rawValue) + '</div></div>' +
        '</div>'
      );
    for (const e of report.hardcodedInA) c.appendChild(make(e, 'A'));
    for (const e of report.hardcodedInB) c.appendChild(make(e, 'B'));
  }
  function renderSummary(report) {
    const s = report.summary;
    document.getElementById('frames').textContent =
      report.frameAName + ' ↔ ' + report.frameBName;
    document.getElementById('summary').innerHTML =
      '<span class="chip ok">Matched ' + s.ok + '</span>' +
      '<span class="chip mismatch">Mismatch ' + s.mismatch + '</span>' +
      '<span class="chip warn">Warn ' + s.warn + '</span>' +
      '<span class="chip hardcoded">Hardcoded ' + s.hardcoded + '</span>' +
      '<span class="chip">Structure ' + s.structureDiff + '</span>';
  }
  var currentReport = null;
  function renderReport(report, previews, bgA, bgB) {
    currentReport = report;
    currentPreviews = previews || {};
    currentBgA = bgA || '';
    currentBgB = bgB || '';
    currentMatched = {};
    const pairs = report.matchedPairs || [];
    for (const p of pairs) currentMatched[p.pathKey] = p;
    renderSummary(report);
    renderMismatches(report);
    renderStructure(report);
    renderHardcoded(report);
    renderOk(report);
    applySelection();
    // Fresh results -> scroll back to the top.
    const body = document.querySelector('.body');
    if (body) body.scrollTop = 0;
  }
  function renderError(message) {
    document.getElementById('frames').textContent = 'Variable Token Checker';
    document.getElementById('summary').innerHTML = '';
    for (const id of ['tab-structure', 'tab-hardcoded', 'tab-ok']) clear(id);
    document.getElementById('tab-mismatches').innerHTML =
      '<div class="error">' + esc(message) + '</div>';
  }

  document.querySelectorAll('.tab').forEach((t) => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach((x) => x.classList.remove('active'));
      document.querySelectorAll('section').forEach((x) => x.classList.remove('active'));
      t.classList.add('active');
      document.getElementById('tab-' + t.dataset.tab).classList.add('active');
    });
  });

  document.getElementById('rerun').addEventListener('click', () => {
    send({ type: 'run' });
  });

  function dedupePairs(pairs) {
    const seen = {};
    const out = [];
    for (const p of pairs) {
      if (!p.nodeIdA && !p.nodeIdB) continue;
      const k = (p.nodeIdA || '') + '|' + (p.nodeIdB || '');
      if (seen[k]) continue;
      seen[k] = true;
      out.push(p);
    }
    return out;
  }
  document.getElementById('rename-all').addEventListener('click', () => {
    const findings = currentReport ? currentReport.findings : [];
    const pairs = dedupePairs(
      findings
        .filter((f) => f.nodeIdA && f.nodeIdB)
        .map((f) => ({ nodeIdA: f.nodeIdA, nodeIdB: f.nodeIdB })),
    );
    if (!pairs.length) return;
    // Empty name => unify each pair's B layer to A's existing name.
    send({ type: 'rename', pairs: pairs, name: '' });
  });

  function selectFrom(elm) {
    const idA = elm.dataset.idA;
    const idB = elm.dataset.idB;
    if (idA || idB) {
      send({ type: 'select-pair', nodeIdA: idA || undefined, nodeIdB: idB || undefined });
      return true;
    }
    const id = elm.dataset.id;
    if (id) {
      send({ type: 'select-node', nodeId: id });
      return true;
    }
    return false;
  }
  document.addEventListener('click', (e) => {
    // A nested sub-layer row takes precedence over its group item.
    const sub = e.target.closest('.subrow');
    if (sub && selectFrom(sub)) return;
    // The text button is the only way to collapse an opened card (toggles).
    const btn = e.target.closest('.expand-btn');
    if (btn) {
      const owner = btn.closest('.item');
      if (owner) owner.classList.toggle('collapsed');
      return;
    }
    const item = e.target.closest('.item');
    if (!item) return;
    // Clicking the card only expands (when collapsed); it never collapses.
    if (item.classList.contains('collapsed') && item.querySelector('.group-body')) {
      item.classList.remove('collapsed');
    }
    selectFrom(item);
  });

  // Corner resize handle: drag to change the plugin window size.
  (function () {
    const handle = document.getElementById('resize');
    let dragging = false;
    handle.addEventListener('pointerdown', (e) => {
      dragging = true;
      handle.setPointerCapture(e.pointerId);
      e.preventDefault();
    });
    handle.addEventListener('pointermove', (e) => {
      if (!dragging) return;
      // clientX/Y track the pointer inside the iframe ≈ the new size.
      const width = Math.max(360, Math.round(e.clientX + 4));
      const height = Math.max(360, Math.round(e.clientY + 4));
      send({ type: 'resize', width: width, height: height });
    });
    const end = (e) => {
      if (!dragging) return;
      dragging = false;
      try { handle.releasePointerCapture(e.pointerId); } catch (err) {}
    };
    handle.addEventListener('pointerup', end);
    handle.addEventListener('pointercancel', end);
  })();

  window.onmessage = (event) => {
    const msg = event.data && event.data.pluginMessage;
    if (!msg) return;
    if (msg.type === 'report') renderReport(msg.report, msg.previews, msg.bgA, msg.bgB);
    else if (msg.type === 'selection') {
      currentSelection = {};
      for (const id of msg.ids || []) currentSelection[id] = true;
      applySelection();
    }
    else if (msg.type === 'error') renderError(msg.message);
  };
</script>
</body>
</html>
